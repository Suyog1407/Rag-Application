<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Application</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f7f8;
            --surface: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --text: #0d0d0d;
            --text-secondary: #6e6e80;
            --text-muted: #8e8ea0;
            --user-bg: #ececf1;
            --input-bg: #ffffff;
            --input-border: rgba(0, 0, 0, 0.12);
            --accent: #0d0d0d;
            --accent-hover: #333333;
            --success: #16a34a;
            --error: #dc2626;
            --chip-bg: #f0f0f3;
            --chip-border: rgba(0, 0, 0, 0.06);
            --source-bg: #f4f4f5;
            --radius-lg: 16px;
            --radius-sm: 8px;
            --shadow-input: 0 0 0 1px rgba(0,0,0,0.06), 0 4px 24px rgba(0,0,0,0.06);
        }

        body.dark {
            --bg: #0d0d0d;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ececec;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --user-bg: #2f2f2f;
            --input-bg: #262626;
            --input-border: rgba(255, 255, 255, 0.1);
            --accent: #ececec;
            --accent-hover: #ffffff;
            --chip-bg: #2a2a2a;
            --chip-border: rgba(255, 255, 255, 0.08);
            --source-bg: #1a1a1a;
            --shadow-input: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.4);
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            transition: background 0.25s ease, color 0.25s ease;
            -webkit-font-smoothing: antialiased;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .app-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        #dark-toggle {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        #dark-toggle:hover {
            background: var(--user-bg);
            color: var(--text);
        }

        .app-main {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 768px;
            margin: 0 auto;
            padding: 32px 20px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            gap: 8px;
            min-height: 280px;
        }

        .empty-state.hidden { display: none; }

        .empty-state-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--user-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .empty-state h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 360px;
            line-height: 1.5;
        }

        #chat-history {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .message-pair {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 88%;
            line-height: 1.65;
            font-size: 15px;
        }

        .message-user {
            align-self: flex-end;
            background: var(--user-bg);
            padding: 12px 16px;
            border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
            font-size: 14px;
        }

        .message-ai {
            align-self: flex-start;
            padding: 4px 0;
        }

        .message-ai .chat-answer {
            font-size: 15px;
            line-height: 1.75;
        }

        .answer-item {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            line-height: 1.65;
        }

        .answer-num {
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 22px;
            flex-shrink: 0;
        }

        .sources {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .sources-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sources-label:hover { color: var(--text-secondary); }

        .sources-content {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .sources-content.open { display: flex; }

        .source-chunk {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--source-bg);
            border-left: 2px solid var(--border);
            padding: 10px 12px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            line-height: 1.6;
            font-family: ui-monospace, "SF Mono", monospace;
            white-space: pre-wrap;
        }

        .source-chunk-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-family: inherit;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-muted);
            padding: 8px 0;
            align-self: flex-start;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .input-dock {
            flex-shrink: 0;
            padding: 12px 20px 24px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
        }

        .input-dock-inner {
            max-width: 768px;
            margin: 0 auto;
        }

        .input-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 8px;
            padding: 0 4px;
        }

        #file-chip-container:empty { display: none; }

        .file-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 20px;
            padding: 6px 10px 6px 12px;
            font-size: 13px;
            max-width: 100%;
        }

        .file-chip-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 220px;
        }

        .file-chip-remove {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0 2px;
        }

        .file-chip-remove:hover { color: var(--text); }

        #upload-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        #upload-status.success { color: var(--success); }
        #upload-status.error { color: var(--error); }

        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-lg);
            padding: 10px 10px 10px 6px;
            box-shadow: var(--shadow-input);
        }

        #pdf-input { display: none; }

        .attach-btn, #ask-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
        }

        .attach-btn {
            background: transparent;
            color: var(--text-secondary);
        }

        .attach-btn:hover {
            background: var(--user-bg);
            color: var(--text);
        }

        #question-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 160px;
            line-height: 1.5;
            padding: 6px 4px;
            outline: none;
        }

        #question-input::placeholder { color: var(--text-muted); }
        #question-input:disabled { opacity: 0.5; }

        #ask-btn {
            background: var(--accent);
            color: var(--bg);
        }

        body.dark #ask-btn { color: #0d0d0d; }

        #ask-btn:hover:not(:disabled) { background: var(--accent-hover); }
        #ask-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .attach-btn svg, #ask-btn svg { width: 18px; height: 18px; }

        #upload-btn { display: none; }

        .message-error {
            color: var(--error);
            font-size: 14px;
            align-self: flex-start;
        }
    </style>
</head>
<body class="dark">
    <header class="app-header">
        <span class="app-title">RAG Application</span>
        <button id="dark-toggle" onclick="toggleDark()">☀️ Light</button>
    </header>

    <main class="app-main">
        <div class="chat-wrapper">
            <div class="empty-state" id="empty-state">
                <div class="empty-state-icon">📄</div>
                <h2>Ask anything about your document</h2>
                <p>Attach a PDF using the paperclip below, then ask your question.</p>
            </div>
            <div id="chat-history"></div>
        </div>
    </main>

    <footer class="input-dock">
        <div class="input-dock-inner">
            <div class="input-meta">
                <div id="file-chip-container"></div>
                <div id="upload-status"></div>
            </div>
            <div class="input-bar">
                <button class="attach-btn" type="button" onclick="document.getElementById('pdf-input').click()" aria-label="Attach PDF">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <input type="file" id="pdf-input" accept=".pdf">
                <textarea id="question-input" rows="1" placeholder="Ask a question about your document…"></textarea>
                <button id="ask-btn" onclick="askQuestion()" aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                    </svg>
                </button>
                <button id="upload-btn" onclick="uploadPDF()">Upload PDF</button>
            </div>
        </div>
    </footer>

<script>
    function toggleDark() {
        const isDark = document.body.classList.toggle("dark");
        document.getElementById("dark-toggle").textContent = isDark ? "☀️ Light" : "🌙 Dark";
        localStorage.setItem("darkMode", isDark);
    }
    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark");
        document.getElementById("dark-toggle").textContent = "☀️ Light";
    } else if (localStorage.getItem("darkMode") === "false") {
        document.body.classList.remove("dark");
        document.getElementById("dark-toggle").textContent = "🌙 Dark";
    }

    function updateEmptyState() {
        const history = document.getElementById("chat-history");
        const empty = document.getElementById("empty-state");
        empty.classList.toggle("hidden", history.children.length > 0);
    }

    function truncateFilename(name, max) {
        if (name.length <= max) return name;
        const ext = name.lastIndexOf(".") > 0 ? name.slice(name.lastIndexOf(".")) : "";
        const base = name.slice(0, name.length - ext.length);
        return base.slice(0, max - ext.length - 1) + "…" + ext;
    }

    function renderFileChip(file) {
        const container = document.getElementById("file-chip-container");
        container.innerHTML =
            '<div class="file-chip">' +
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
                '<span class="file-chip-name">' + escapeHTML(truncateFilename(file.name, 28)) + '</span>' +
                '<button class="file-chip-remove" type="button" onclick="clearFileChip()" aria-label="Remove file">&times;</button>' +
            '</div>';
    }

    function clearFileChip() {
        document.getElementById("pdf-input").value = "";
        document.getElementById("file-chip-container").innerHTML = "";
        document.getElementById("upload-status").textContent = "";
        document.getElementById("upload-status").className = "";
    }

    document.getElementById("pdf-input").addEventListener("change", function() {
        if (this.files[0]) {
            renderFileChip(this.files[0]);
            uploadPDF();
        }
    });

    const questionInput = document.getElementById("question-input");
    questionInput.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 160) + "px";
    });

    async function uploadPDF() {
        const fileInput = document.getElementById("pdf-input");
        const status = document.getElementById("upload-status");
        const btn = document.getElementById("upload-btn");
        if (!fileInput.files[0]) { status.textContent = "Please select a PDF file first."; status.className = "error"; return; }
        btn.disabled = true; btn.textContent = "Uploading...";
        status.textContent = "Processing PDF — this may take a few seconds…"; status.className = "";
        const formData = new FormData();
        formData.append("pdf", fileInput.files[0]);
        try {
            const response = await fetch("/upload", { method: "POST", body: formData });
            const data = await response.json();
            if (!response.ok) {
                status.textContent = data.message || "Upload failed.";
                status.className = "error";
                return;
            }
            status.textContent = data.message; status.className = "success";
            document.getElementById("chat-history").innerHTML = "";
            updateEmptyState();
        } catch (err) { status.textContent = "Upload failed — is the server running?"; status.className = "error"; }
        btn.disabled = false; btn.textContent = "Upload PDF";
    }

    async function askQuestion() {
        const questionInput = document.getElementById("question-input");
        const chatHistory = document.getElementById("chat-history");
        const btn = document.getElementById("ask-btn");
        const question = questionInput.value.trim();
        if (!question) return;
        btn.disabled = true; questionInput.disabled = true;
        document.getElementById("empty-state").classList.add("hidden");
        const thinkingEl = document.createElement("div");
        thinkingEl.className = "thinking";
        thinkingEl.innerHTML = '<span class="spinner"></span> Generating answer…';
        chatHistory.insertBefore(thinkingEl, chatHistory.firstChild);
        thinkingEl.scrollIntoView({ behavior: "smooth" });
        try {
            const response = await fetch("/ask", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ question }) });
            const data = await response.json();
            chatHistory.removeChild(thinkingEl);
            let sourcesHTML = "";
            if (data.sources && data.sources.length > 0) {
                const sourceId = "src-" + Date.now();
                let chunksHTML = "";
                data.sources.forEach(function(chunk, i) {
                    chunksHTML += '<div class="source-chunk"><div class="source-chunk-label">Chunk ' + (i+1) + '</div>' + escapeHTML(chunk.substring(0, 250)) + '…</div>';
                });
                sourcesHTML = '<div class="sources"><div class="sources-label" onclick="toggleSources(\'' + sourceId + '\')"><span class="sources-toggle" id="arrow-' + sourceId + '">▶</span> Sources · ' + data.sources.length + ' chunks</div><div class="sources-content" id="' + sourceId + '">' + chunksHTML + '</div></div>';
            }
            const item = document.createElement("div");
            item.className = "message-pair";
            item.innerHTML =
                '<div class="message message-user">' + escapeHTML(question) + '</div>' +
                '<div class="message message-ai"><div class="chat-answer">' + formatAnswer(data.answer) + '</div>' + sourcesHTML + '</div>';
            chatHistory.insertBefore(item, chatHistory.firstChild);
            item.scrollIntoView({ behavior: "smooth" });
            questionInput.value = "";
            questionInput.style.height = "auto";
            updateEmptyState();
        } catch (err) {
            chatHistory.removeChild(thinkingEl);
            const item = document.createElement("div");
            item.className = "message-pair";
            item.innerHTML = '<div class="message message-error">Something went wrong.</div>';
            chatHistory.insertBefore(item, chatHistory.firstChild);
            updateEmptyState();
        }
        btn.disabled = false; questionInput.disabled = false; questionInput.focus();
    }

    function formatAnswer(str) {
        let safe = str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        safe = safe.replace(/^(\d+)\.\s(.+)$/gm, '<div class="answer-item"><span class="answer-num">$1.</span> <span>$2</span></div>');
        safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        safe = safe.replace(/\n\n/g, '<br><br>');
        safe = safe.replace(/\n/g, '<br>');
        return safe;
    }

    function toggleSources(id) {
        const content = document.getElementById(id);
        const arrow = document.getElementById("arrow-" + id);
        if (content.classList.contains("open")) { content.classList.remove("open"); arrow.textContent = "▶"; }
        else { content.classList.add("open"); arrow.textContent = "▼"; }
    }

    function escapeHTML(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && e.target.id === "question-input" && !e.shiftKey) { e.preventDefault(); askQuestion(); }
    });
</script>
</body>
</html>
